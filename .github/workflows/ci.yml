name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: Rust ${{matrix.rust}} on ${{matrix.os}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: ${{github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest", "windows-11-arm", "ubuntu-24.04-arm"]')}}
        rust: ${{github.actor == 'dependabot[bot]' && fromJSON('["stable"]') || fromJSON('["nightly", "beta", "stable", "1.62.0", "stable 18 months ago", "stable minus 8 releases"]')}}
        include:
          - os: ubuntu-latest
            rust: 1.0.0
    timeout-minutes: 45
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        name: Run step-security/dtonlay-rust-toolchain${{contains(matrix.rust, ' ') && ' for ' || '@'}}${{matrix.rust}}
        id: toolchain
        with:
          toolchain: ${{matrix.rust}}
      - name: echo ${{'${{steps.toolchain.outputs.cachekey}}'}}
        run: echo '${{steps.toolchain.outputs.cachekey}}'
      - name: check ${{'${{steps.toolchain.outputs.cachekey}}'}}
        if: matrix.rust == '1.62.0'
        run: cmp -s <(echo ${{steps.toolchain.outputs.cachekey}}) <(echo 20220627a831)
        shell: bash
      - run: rustc --version
      - run: cargo init . --bin --name CI
        if: matrix.rust == 'nightly' || matrix.rust == 'beta' || matrix.rust == 'stable'
      - run: cargo add syn@1
        if: matrix.rust == 'nightly' || matrix.rust == 'beta' || matrix.rust == 'stable'
      - run: cargo check
        if: matrix.rust == 'nightly' || matrix.rust == 'beta' || matrix.rust == 'stable'
